# Historical events library for backtest validation
# Spec reference: §1.3, §2.4
#
# Each event has:
#   id:          unique slug
#   label:       human-readable event name
#   iso3:        country code
#   t0:          T-0 date (the event date, not first news coverage)
#   description: brief description of the event
#
# Evaluation: for each event, compute max Watchlist in 30d preceding t0,
# percentile rank at T-7 globally, and whether model flagged country
# in top-20 at any point in the 60 days preceding t0.
#
# Be aggressively honest: if the model missed, say so.

events:
  - id: niger_coup_2023
    label: "Niger coup, 26 July 2023"
    iso3: NER
    t0: "2023-07-26"
    description: >
      Military junta seized power, ousting President Bazoum. France
      withdrew its ambassador and military presence in following months.
      Preceded by Mali/Burkina/Guinea coups — strong contagion signal expected.

  - id: sudan_rsf_2023
    label: "Sudan RSF conflict outbreak, 15 April 2023"
    iso3: SDN
    t0: "2023-04-15"
    description: >
      Armed conflict broke out between Sudanese Armed Forces and Rapid
      Support Forces in Khartoum. One of the largest humanitarian crises
      of 2023. Tensions were visible in GDELT data weeks prior.

  - id: kazakhstan_protests_2022
    label: "Kazakhstan protests (Bloody January), 2 January 2022"
    iso3: KAZ
    t0: "2022-01-02"
    description: >
      Mass protests triggered by fuel price hikes; government declared
      state of emergency; CSTO peacekeepers deployed. Relatively fast
      escalation — a test of the model's sensitivity to rapid onset events.

  - id: myanmar_coup_2021
    label: "Myanmar military coup, 1 February 2021"
    iso3: MMR
    t0: "2021-02-01"
    description: >
      Military seized power, detained Aung San Suu Kyi. Followed months
      of political tension over disputed November 2020 elections.
      Pre-coup GDELT signals should show elevated conflict events.

  - id: russia_ukraine_2022
    label: "Russia full-scale invasion of Ukraine, 24 February 2022"
    iso3: UKR
    t0: "2022-02-24"
    description: >
      Russia launched full-scale invasion. Note: model should flag Ukraine
      as elevated, but Russia was also elevated. Both countries expected
      in top signals weeks prior given Donbas shelling buildup.

  - id: wagner_mutiny_2023
    label: "Wagner mutiny (Prigozhin march on Moscow), 23 June 2023"
    iso3: RUS
    t0: "2023-06-23"
    description: >
      Yevgeny Prigozhin led Wagner forces toward Moscow before aborting.
      Very fast onset event — likely a miss for most models. Honest
      assessment of model limitations expected here.

  - id: october_7_2023
    label: "Hamas attack on Israel (October 7), 7 October 2023"
    iso3: ISR
    t0: "2023-10-07"
    description: >
      Hamas launched large-scale attack from Gaza. Preceded by elevated
      tensions in West Bank. Model should show ISR and PSE elevated;
      whether it reached top-20 before T-0 is the honest test.

  - id: turkey_coup_attempt_2016
    label: "Turkey attempted coup, 15 July 2016"
    iso3: TUR
    t0: "2016-07-15"
    description: >
      Stretch event — GDELT v2 coverage thinner in 2016. Include as a
      data quality stress test. Expect potential miss; note data limitations
      honestly in backtest.json output.
